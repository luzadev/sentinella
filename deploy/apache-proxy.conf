# Reverse proxy Apache per Sentinella.
# In Virtualmin la VirtualHost del dominio è gestita dal pannello: NON modificarla
# a mano (verrebbe sovrascritta). Usa invece uno di questi modi:
#
#  A) Virtualmin → <dominio> → Services → "Proxy Paths" → aggiungi:
#       Path: /     URL: http://127.0.0.1:8000/
#
#  B) Virtualmin → <dominio> → Server Configuration → "Edit Directives"
#     e incolla le righe qui sotto DENTRO il <VirtualHost> (sia :80 che :443).
#
# Moduli richiesti:  a2enmod proxy proxy_http headers

ProxyPreserveHost On
ProxyPass        /  http://127.0.0.1:8000/
ProxyPassReverse /  http://127.0.0.1:8000/

# inoltra info su protocollo/host all'app dietro il proxy
RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Host  "%{HTTP_HOST}s"
